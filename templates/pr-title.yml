name: PR Title

on:
  pull_request_target:
    types: [opened, edited, synchronize, reopened]

concurrency:
  group: pr-title-${{ "{{ github.event.pull_request.number }}" }}
  cancel-in-progress: true

jobs:
  lint:
    name: Conventional Commit Check
    runs-on: {{ runner | default(value="ubuntu-24.04") }}
    timeout-minutes: 5
    permissions:
      statuses: write
    steps:
      - uses: aslafy-z/conventional-pr-title-action@{{ action_version | default(value="v3") }}
        env:
          GITHUB_TOKEN: ${{ "{{ secrets.GITHUB_TOKEN }}" }}
