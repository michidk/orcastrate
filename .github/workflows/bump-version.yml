name: Bump Version

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

defaults:
  run:
    shell: bash

jobs:
  bump:
    name: Bump version and tag
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.ORCASTRATE_TOKEN }}

      - uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-edit
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-edit

      - name: Get current version
        id: current
        run: |
          version=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "version=$version" >> $GITHUB_OUTPUT

      - name: Bump version in Cargo.toml
        run: cargo set-version --bump ${{ inputs.bump }}

      - name: Get new version
        id: new
        run: |
          version=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "version=$version" >> $GITHUB_OUTPUT
          echo "tag=v$version" >> $GITHUB_OUTPUT

      - name: Commit and tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Cargo.toml Cargo.lock
          git commit -m "chore(release): ${{ steps.new.outputs.tag }}"
          git tag "${{ steps.new.outputs.tag }}"
          git push origin main --tags

      - name: Summary
        run: |
          echo "### Version Bumped 🐬" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**${{ steps.current.outputs.version }}** → **${{ steps.new.outputs.version }}** (${{ inputs.bump }})" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Tag \`${{ steps.new.outputs.tag }}\` pushed — release workflow will build and publish." >> $GITHUB_STEP_SUMMARY
